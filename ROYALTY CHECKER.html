<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Compare Vehicle Weights</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    /* Reset and base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 15px;
      color: #fff;
    }

    .container {
      max-width: 950px;
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 30px;
      backdrop-filter: blur(15px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    h2 {
      font-size: 26px;
      margin-bottom: 20px;
      text-align: center;
      color: #f7f7f7;
    }

    input[type="file"] {
      background-color: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #fff;
      padding: 8px 10px;
      border-radius: 10px;
      margin: 10px 10px 20px 0;
      cursor: pointer;
    }

    button {
      padding: 10px 18px;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      color: #fff;
      border-radius: 12px;
      margin: 5px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.3);
      font-weight: bold;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.35);
      color: #000;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 30px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      background-color: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(5px);
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    th {
      background-color: rgba(255, 215, 0, 0.3);
      color: #fff;
      font-size: 14px;
    }

    tbody tr:nth-child(even) {
      background-color: rgba(255, 255, 255, 0.06);
    }

    tfoot td {
      font-weight: bold;
      background-color: rgba(255, 255, 255, 0.2);
    }

    @media (max-width: 600px) {
      table, thead, tbody, th, td, tr {
        display: block;
      }

      th {
        display: none;
      }

      td {
        text-align: right;
        padding-left: 50%;
        position: relative;
      }

      td::before {
        content: attr(data-label);
        position: absolute;
        left: 10px;
        width: 45%;
        padding-left: 10px;
        font-weight: bold;
        text-align: left;
        color: #ddd;
      }

      td:last-child {
        border-bottom: 2px solid #999;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Compare Vehicle Weights</h2>
    <input type="file" id="file1" accept=".xlsx, .xls">
    <input type="file" id="file2" accept=".xlsx, .xls">
    <button onclick="processFiles()">Compare</button>
    <button onclick="exportToExcel()">Export Only Differences</button>

    <div id="result"></div>
  </div>

  <script>
    function getLast4(str) {
      return str.toString().slice(-4);
    }

    function readExcel(file, callback) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const sheetName = workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];
        const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });
        callback(json);
      };
      reader.readAsArrayBuffer(file);
    }

    let comparisonData = [];

    function processFiles() {
      const file1 = document.getElementById('file1').files[0];
      const file2 = document.getElementById('file2').files[0];

      if (!file1 || !file2) {
        alert("Please upload both files.");
        return;
      }

      readExcel(file1, (data1) => {
        readExcel(file2, (data2) => {
          compareData(data1, data2);
        });
      });
    }

    function compareData(data1, data2) {
      const sumMap1 = {};
      const sumMap2 = {};

      for (let i = 1; i < data1.length; i++) {
        const row = data1[i];
        if (!row[0] || !row[1]) continue;
        const key = getLast4(row[0]);
        sumMap1[key] = (sumMap1[key] || 0) + Number(row[1]);
      }

      for (let i = 1; i < data2.length; i++) {
        const row = data2[i];
        if (!row[0] || !row[1]) continue;
        const key = getLast4(row[0]);
        sumMap2[key] = (sumMap2[key] || 0) + Number(row[1]);
      }

      const allKeys = new Set([...Object.keys(sumMap1), ...Object.keys(sumMap2)]);
      let html = `<table><thead><tr>
                  <th>Vehicle No</th>
                  <th>WEIGHT1</th>
                  <th>WEIGHT2</th>
                  <th>DIFFERENCE</th>
                  </tr></thead><tbody>`;

      comparisonData = [];
      let total1 = 0, total2 = 0;

      allKeys.forEach(key => {
        const w1 = sumMap1[key] || 0;
        const w2 = sumMap2[key] || 0;
        const diff = w1 - w2;
        html += `<tr>
                    <td data-label="Vehicle No">${key}</td>
                    <td data-label="WEIGHT1">${w1}</td>
                    <td data-label="WEIGHT2">${w2}</td>
                    <td data-label="DIFFERENCE">${diff}</td>
                 </tr>`;
        comparisonData.push([key, w1, w2, diff]);
        total1 += w1;
        total2 += w2;
      });

      html += `</tbody>
               <tfoot>
                  <tr>
                    <td>TOTAL</td>
                    <td>${total1}</td>
                    <td>${total2}</td>
                    <td>${total1 - total2}</td>
                  </tr>
               </tfoot>
               </table>`;

      document.getElementById('result').innerHTML = html;
    }

    function exportToExcel() {
      if (comparisonData.length === 0) {
        alert("Please compare files first.");
        return;
      }

      const filtered = comparisonData.filter(row => row[3] !== 0);
      if (filtered.length === 0) {
        alert("No differences found to export.");
        return;
      }

      const wb = XLSX.utils.book_new();
      const ws_data = [["Vehicle No", "WEIGHT1", "WEIGHT2", "DIFFERENCE"], ...filtered];
      const ws = XLSX.utils.aoa_to_sheet(ws_data);
      XLSX.utils.book_append_sheet(wb, ws, "Differences");

      XLSX.writeFile(wb, "Only_Differences.xlsx");
    }
  </script>
</body>
</html>
